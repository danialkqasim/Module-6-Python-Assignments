{% extends 'blog/base.html' %}

{% block content %}
    <div>
        {% for post in posts %}
            <article>
                <div class="date">
                    Logged on: {{ post.published_date }}
                </div>
                <h2><a href="">{{ post.title }}</a></h2>
                <p>{{ post.text|linebreaksbr }}</p>
                <p class="analyst-note">-- Analyst: {{ post.author }}</p>
            </article>
        {% endfor %}
    </div>
{% endblock %}
